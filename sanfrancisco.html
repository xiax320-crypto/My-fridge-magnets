<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Francisco</title>
  <link rel="stylesheet" href="sanfrancisco.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700&display=swap');
  </style>
</head>
<body>
      <button class="corner-magnet" aria-label="magnet"onclick="location.href='index.html'">
    <img src="img/sfgoldengate.png" alt="Golden gate bridge magnet">
  </button>

  <main class="sf-page">


    <div class="block yellow-block top-left"></div>
    <div class="block pink-block top-right"></div>
    <div class="block yellow-block bottom-middle"></div>
    <div class="block pink-block bottom-under"></div>
    <div class="block pink-block bottom-last"></div>

    <div class="word w1">San Francisco</div>
    <div class="word w2">2026</div>
    <div class="word w3">March</div>
    <div class="word w4">spring break</div>
    <div class="word w5">California</div>

    <figure class="photo p1">
      <img src="img/sf1.jpg" alt="San Francisco photo 1">
    </figure>

<figure class="photo p2 photo-group">
  <button class="photo-btn">
    <img src="img/sf2.jpg" alt="San Francisco photo 2">
  </button>
  <div class="photo-note">
    Golden Gate Bridge view.
  </div>
</figure>
<figure class="photo p3 photo-group">
  <button class="photo-btn">
    <img src="img/sf3.jpg" alt="San Francisco photo 3">
  </button>
  <div class="photo-note">
    Here is the biggest China town in US.
  </div>
</figure>

    <figure class="photo p4">
      <img src="img/sf4.jpg" alt="San Francisco photo 4">
    </figure>

    <figure class="photo p5">
      <img src="img/sf5.jpg" alt="San Francisco photo 5">
    </figure>

<figure class="photo p6 photo-group">
  <button class="photo-btn">
    <img src="img/sf6.jpg" alt="San Francisco photo 6">
  </button>
  <div class="photo-note">
  The Palace of Fine Art in San Francisco.
  </div>
</figure>

  </main>

</body>
</html>
