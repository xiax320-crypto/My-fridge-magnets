<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>King's Cross Station</title>
  <link rel="stylesheet" href="platform934.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@200;300;400;500&display=swap');
  </style>
</head>
<body>

  <main class="station-page">
    <section class="image-stack">
      <div class="panel panel-1">
        <img src="img/kingscross1.jpg" alt="King's Cross image 1">
      </div>

      <div class="panel panel-2">
        <img src="img/kingscross2.jpg" alt="King's Cross image 2">
      </div>

      <div class="panel panel-3">
        <img src="img/kingscross3.jpg" alt="King's Cross image 3">
      </div>

      <div class="panel panel-4">
        <img src="img/kingscross4.jpg" alt="King's Cross image 4">
      </div>

    </section>

    <!-- 覆盖文字 -->
    <section class="text-overlay">
      <h1 class="overlay-line line-1">King’s Cross Station</h1>
      <h1 class="overlay-line line-2">King’s Cross Station</h1>
      <h1 class="overlay-line line-3">King’s Cross Station</h1>
    </section>

    <!-- 中间 magnet button -->
    <button class="center-magnet"
            onclick="location.href='index.html'"
            aria-label="Back to homepage">
      <img src="img/platform-magnet.png" alt="Platform 9 3/4 magnet">
    </button>

  </main>

</body>
</html>
