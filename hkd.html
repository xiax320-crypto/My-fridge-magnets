<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hokkaido</title>
  <link rel="stylesheet" href="hkd.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700&display=swap');
  </style>
</head>
<body>

  <main class="hokkaido-page">

    <section class="left-panel">
      <img src="img/Hokkaidomain.jpg" alt="Hokkaido main photo">
    </section>

    <section class="right-panel">

      <button class="corner-magnet"
              aria-label="Back to homepage"
              onclick="location.href='index.html'">
        <img src="img/hokkaidomagnet.png" alt="Hokkaido magnet">
      </button>

      <div class="meta top-left">Hokkaido</div>
      <div class="meta top-right">Japan</div>
      <div class="meta bottom-left">2025</div>
      <div class="meta bottom-right">January</div>

      <button class="dot dot-1"></button>
      <button class="dot dot-2"></button>
      <button class="dot dot-3"></button>


      <div class="scroll-content">

        <figure class="small-photo photo-1">
          <img src="img/hokkaido1.jpg" alt="Hokkaido photo 1">
        </figure>

        <figure class="small-photo photo-2">
          <img src="img/hokkaido2.jpg" alt="Hokkaido photo 2">
        </figure>

        <figure class="small-photo photo-3">
          <img src="img/hokkaido3.jpg" alt="Hokkaido photo 3">
        </figure>

      </div>

<div class="photo-group group-1">
  <button class="photo-btn photo-btn-1">
    <img src="img/hokkaido4.jpg" alt="Hokkaido photo 1">
  </button>
  <div class="photo-note note-1">
    This shop was full of delicate glass ornaments and tiny reflections.
  </div>
</div>

<div class="photo-group group-2">
  <button class="photo-btn photo-btn-2">
    <img src="img/hokkaido5.jpg" alt="Hokkaido photo 2">
  </button>
  <div class="photo-note note-2">
    At night, the snow lanterns glowed softly and the whole place felt very quiet.
  </div>
</div>
    </section>

  </main>

</body>
</html>
