<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibetan</title>
  <link rel="stylesheet" href="tibet.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@200;300;400;500&display=swap');
  </style>
</head>
<body>

  <main class="tibet-page">

    <button class="corner-magnet"
            aria-label="Back to homepage"
            onclick="location.href='index.html'">
      <img src="img/tibetmagnet.png" alt="Tibet magnet">
    </button>

    <section class="left-gallery">

      <figure class="left-photo photo-1">
        <img src="img/tibet1.jpg" alt="Tibet photo 1">
      </figure>

      <figure class="left-photo photo-2">
        <img src="img/tibet2.jpg" alt="Tibet photo 2">
      </figure>

      <figure class="left-photo photo-3">
        <img src="img/tibet3.jpg" alt="Tibet photo 3">
      </figure>

      <figure class="left-photo photo-4">
        <img src="img/tibet4.jpg" alt="Tibet photo 4">
      </figure>

      <figure class="left-photo photo-5">
        <img src="img/tibet5.jpg" alt="Tibet photo 5">
      </figure>

      <figure class="left-photo photo-6">
        <img src="img/tibet6.jpg" alt="Tibet photo 6">
      </figure>

      <figure class="left-photo photo-7">
        <img src="img/tibet7.jpg" alt="Tibet photo 7">
      </figure>

      <figure class="left-photo photo-8">
        <img src="img/tibet8.jpg" alt="Tibet photo 8">
      </figure>

    </section>

    <section class="right-panel">

      <figure class="main-photo">
        <img src="img/tibetmain.jpg" alt="Main Tibet photo">
      </figure>

      <div class="word word-1">Tibetan</div>
      <div class="word word-2">2021 July</div>
      <div class="word word-3">Lhasa</div>
      <div class="word word-4">Qomolangma</div>
      <div class="word word-5">Kangrinboqe</div>

    </section>

  </main>

</body>
</html>
