<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hong Shan Zoo</title>
  <link rel="stylesheet" href="zoo.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;700&display=swap');
  </style>
</head>
<body>

  <button class="corner-magnet" aria-label="Zoo magnet">
    <img src="img/zoo-magnet.png" alt="Hong Shan Zoo magnet">
  </button>

  <main class="zoo-page">


    <div class="bg-dot dot-1"></div>
    <div class="bg-dot dot-2"></div>
    <div class="bg-dot dot-3"></div>
    <div class="bg-dot dot-4"></div>
    <div class="bg-dot dot-5"></div>
    <div class="bg-dot dot-6"></div>
    <div class="bg-dot dot-7"></div>
    <div class="bg-dot dot-8"></div>
    <div class="bg-dot dot-9"></div>
    <div class="bg-dot dot-10"></div>
    <div class="bg-dot dot-11"></div>
    <div class="bg-dot dot-12"></div>


    <h1 class="title-piece title-1">Hong</h1>
    <h1 class="title-piece title-2">Shan</h1>
    <h1 class="title-piece title-3">Zoo</h1>
    <h1 class="title-piece title-4">Nanjing</h1>


    <section class="gallery">

      <figure class="photo photo-1">
        <img src="img/zoo1.jpg" alt="Zoo photo 1">
      </figure>

      <figure class="photo photo-2">
        <img src="img/zoo2.JPG" alt="Zoo photo 2">
      </figure>

      <figure class="photo photo-3">
        <img src="img/zoo3.jpg" alt="Zoo photo 3">
      </figure>

      <figure class="photo photo-4">
        <img src="img/zoo4.jpg" alt="Zoo photo 4">
      </figure>

      <figure class="photo photo-5">
        <img src="img/zoo5.jpg" alt="Zoo photo 5">
      </figure>

      <figure class="photo photo-6">
        <img src="img/zoo6.jpg" alt="Zoo photo 6">
      </figure>

      <figure class="photo photo-7">
        <img src="img/zoo7.jpg" alt="Zoo photo 7">
      </figure>

      <figure class="photo photo-8">
        <img src="img/zoo8.jpg" alt="Zoo photo 8">
      </figure>

    </section>

    <section class="intro-text">
      <p>
        Hong Shan Zoo, Nanjing — A collection of images from my trip
       
      </p>
    </section>

  </main>

</body>
</html>
