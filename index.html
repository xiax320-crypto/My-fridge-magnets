<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Fridge Magnets</title>
  <link rel="stylesheet" href="homepage.css">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&display=swap');
</style>
</head>
<body>

  <div class="bg"></div>

  <main class="home">

    <section class="fridge-scene">

      <h1 class="fridge-title">My Fridge Magnets</h1>


      <div class="fridge-wrap">

       
          <svg class="fridge-svg" width="628" height="1241" viewBox="0 0 628 1241" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M584.037 813.896L566.328 836.966L5.03223 811.229L32.8906 794.514L584.037 813.896Z" fill="#D9D9D9" stroke="black" stroke-width="3"/>
            <rect x="552" y="787.5" width="54" height="51" fill="#D9D9D9"/>
            <path d="M626.5 24.0088V1182.85L569.011 1236.54L572.992 2.22656L626.5 24.0088Z" fill="#D9D9D9" stroke="black" stroke-width="3"/>
            <path d="M570.5 802.184V820.934L15.6279 797.25L9.3418 783.08L570.5 802.184Z" fill="#ECECEC" stroke="black" stroke-width="3"/>
            <path d="M570.5 800.944L2 780.553V16.46L570.5 1.53906V800.944Z" fill="white" stroke="black" stroke-width="3"/>
            <path d="M571 820.646L627 800.68M571 800.68L627 781.712M602.279 14.5V1205.5" stroke="black" stroke-width="3"/>
            <path d="M570.5 835L626 816" stroke="black" stroke-width="3"/>
            <path d="M569.5 835.468V1238.91L1.5 1207.54V813.061L569.5 835.468Z" fill="white" stroke="black" stroke-width="3"/>
          </svg>

          <button class="magnet magnet-sf" onclick="location.href='sanfrancisco.html'" aria-label="San Francisco magnet">

  <div class="sf-card">

    <div class="sf-title">SAN FRANCISCO</div>
    <div class="sf-subtitle">CALIFORNIA</div>


    <div class="bridge">
      <span class="tower tower-left"></span>
      <span class="tower tower-right"></span>

      <span class="cable cable-1"></span>
      <span class="cable cable-2"></span>
      <span class="cable cable-3"></span>
      <span class="cable cable-4"></span>
      <span class="cable cable-5"></span>
      <span class="cable cable-6"></span>

<span class="tower-bar bar1"></span>
<span class="tower-bar bar2"></span>
<span class="tower-bar bar3"></span>
      <span class="bridge-road"></span>
    </div>

  </div>

</button>

         <button class="magnet magnet-platform" onclick="location.href='platform934.html'">

  <div class="platform-badge">

    <svg class="platform-ring-text" viewBox="0 0 100 100">
      <defs>
        <path id="topArc" d="M 18,50 A 32,32 0 0,1 82,50" />
        <path id="bottomArc" d="M 82,50 A 32,32 0 0,1 18,50" />
      </defs>

      <text class="ring-top">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">
          PLATFORM
        </textPath>
      </text>

      <text class="ring-bottom">
        <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
          KING'S CROSS · LONDON
        </textPath>
      </text>
    </svg>

    <div class="platform-number">
      <span class="nine">9</span>
      <div class="fraction-wrap">
        <span class="fraction top">3</span>
        <span class="slash"></span>
        <span class="fraction bottom">4</span>
      </div>
    </div>

  </div>

</button>

               <button class="magnet magnet-tibet" onclick="location.href='tibet.html'">

  <div class="tibet-card">
    <div class="tibet-text-left">TIBET</div>

    <div class="dharma-wheel"></div>

    <div class="deer deer-left"></div>

    <div class="deer deer-right"></div>

    <div class="temple-base"></div>

  </div>

</button>

<button class="magnet-bird" onclick="location.href='zoo.html'" aria-label="Bird magnet">

  <span class="bird-card">

    <span class="bird">
      <span class="bird-head"></span>
      <span class="bird-body"></span>
      <span class="bird-tail"></span>
      <span class="bird-beak"></span>
    </span>

    <span class="bird-caption">Lonchura striata</span>

  </span>
  
</button>

<button class="magnet magnet-van-gogh" onclick="location.href='vangogh.html'">

  <div class="frame">
    
    <div class="painting">

      <div class="flower f1"></div>
      <div class="flower f2"></div>
      <div class="flower f3"></div>
      <div class="flower f4"></div>
      <div class="flower f5"></div>
      <div class="flower f6"></div>

      <div class="vase"></div>

    </div>

  </div>

</button>


  <button class="magnet-frog" onclick="location.href='hkd.html'" aria-label="Frog magnet">
    <span class="frog-board">
      <span class="frog-rope">
        <span class="rope-left"></span>
        <span class="rope-right"></span>
        <span class="rope-knot"></span>
      </span>
      <span class="frog-text-small">元気にケロリと</span>
      <span class="frog-stamp">福</span>

      <span class="frog-body"></span>
      <span class="frog-head"></span>
      <span class="frog-eye frog-eye-left"></span>
      <span class="frog-eye frog-eye-right"></span>
      <span class="frog-arm"></span>
      <span class="frog-dot frog-dot-left"></span>
      <span class="frog-dot frog-dot-right"></span>
    </span>
  </button>

</div>



      </div>
 
    </section>

  </main>

</body>
</html>
